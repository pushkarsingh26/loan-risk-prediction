<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M50 5 L90 22 L90 52 Q90 78 50 95 Q10 78 10 52 L10 22 Z" fill="url(#shieldGrad)" stroke="url(#glowGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Inner shield outline -->
  <path d="M50 13 L82 27 L82 52 Q82 72 50 86 Q18 72 18 52 L18 27 Z" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.5"/>

  <!-- Bar chart -->
  <rect x="28" y="58" width="6" height="12" fill="url(#glowGrad)" opacity="0.85" rx="1"/>
  <rect x="37" y="50" width="6" height="20" fill="url(#glowGrad)" opacity="0.85" rx="1"/>
  <rect x="46" y="55" width="6" height="15" fill="url(#glowGrad)" opacity="0.85" rx="1"/>

  <!-- Heartbeat / EKG line -->
  <polyline points="28,50 34,50 37,42 41,58 44,44 48,50 60,50" stroke="#93c5fd" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Upward arrow -->
  <line x1="58" y1="68" x2="72" y2="34" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <polyline points="65,34 72,34 72,41" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- CPU chip -->
  <rect x="60" y="56" width="14" height="14" rx="2" fill="none" stroke="#93c5fd" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="63" y="59" width="8" height="8" rx="1" fill="#1e40af" stroke="#60a5fa" stroke-width="1"/>
  <line x1="63" y1="54" x2="63" y2="56" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="67" y1="54" x2="67" y2="56" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="71" y1="54" x2="71" y2="56" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="63" y1="70" x2="63" y2="72" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="67" y1="70" x2="67" y2="72" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="71" y1="70" x2="71" y2="72" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="58" y1="60" x2="60" y2="60" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="58" y1="63" x2="60" y2="63" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="74" y1="60" x2="76" y2="60" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="74" y1="63" x2="76" y2="63" stroke="#93c5fd" stroke-width="1.2"/>
</svg>
